const TOTAL_ITEMS = SECTIONS.reduce((s,sec)=>s+sec.items.length,0);
const storeData = {};
let activeStore = null;
let activeTab = 0;

function getStoreKey(code){return `store_${code}`}
function loadStore(code){
  const k=getStoreKey(code);
  const raw=localStorage.getItem(k);
  if(raw)return JSON.parse(raw);
  const d={};
  SECTIONS.forEach(sec=>sec.items.forEach(it=>{d[it.no]=''}));
  return d;
}
function saveStore(code,data){
  try{localStorage.setItem(getStoreKey(code),JSON.stringify(data));}catch(e){}
}
function getProgress(data){
  let done=0,total=0;
  SECTIONS.forEach(sec=>sec.items.forEach(it=>{
    total++;
    if(data[it.no]==='done'||data[it.no]==='na')done++;
  }));
  return{done,total};
}

function buildStoreList(filter=''){
  const list=document.getElementById('store-list');
  list.innerHTML='';
  const f=filter.toLowerCase();
  STORES.forEach(([code,name])=>{
    if(f&&!code.includes(f)&&!name.includes(f))return;
    const data=storeData[code]||(storeData[code]=loadStore(code));
    const{done,total}=getProgress(data);
    const div=document.createElement('div');
    div.className='store-item'+(activeStore===code?' active':'');
    div.innerHTML=`<div><div>${name}</div><div class="store-code">สาขา ${code}</div></div><div class="store-dot${done===total?' done':done>0?' partial':''}"></div>`;
    div.onclick=()=>selectStore(code);
    list.appendChild(div);
  });
}

function selectStore(code){
  activeStore=code;
  if(!storeData[code])storeData[code]=loadStore(code);
  document.getElementById('empty-state').style.display='none';
  document.getElementById('checklist-area').style.display='block';
  const store=STORES.find(s=>s[0]===code);
  document.getElementById('banner-name').textContent=`สาขา ${code} – ${store[1]}`;
  renderBannerStats();
  renderTab();
  buildStoreList(document.getElementById('store-search').value);
}

function renderBannerStats(){
  const data=storeData[activeStore];
  const{done,total}=getProgress(data);
  const pct=Math.round(done/total*100);
  const wip=Object.values(data).filter(v=>v==='wip').length;
  document.getElementById('banner-stats').innerHTML=
    `<div class="stat-pill stat-done"><i class="ti ti-circle-check" aria-hidden="true"></i> ${done}/${total} เสร็จ</div>`+
    `<div class="stat-pill stat-pend"><i class="ti ti-clock" aria-hidden="true"></i> ${wip} กำลังดำเนินการ</div>`+
    `<div class="stat-pill">${pct}%</div>`;
}

function renderTab(){
  const area=document.getElementById('checklist-area');
  area.innerHTML='';
  const data=storeData[activeStore];
  SECTIONS.filter(s=>s.tab===activeTab).forEach(sec=>{
    const head=document.createElement('div');
    head.className='section-head';
    head.style.background=sec.color;
    head.textContent=sec.title;
    area.appendChild(head);
    sec.items.forEach(it=>{
      const row=document.createElement('div');
      row.className='checklist-row';
      const val=data[it.no]||'';
      const cls=val==='done'?'s-done':val==='nope'?'s-nope':val==='wip'?'s-wip':val==='na'?'s-na':'';
      row.innerHTML=`
        <div>
          <div class="item-topic">${it.no} &nbsp;${it.topic}</div>
          <div class="item-detail">${it.detail}</div>
        </div>
        <div class="item-deadline"><i class="ti ti-clock" aria-hidden="true" style="font-size:11px;margin-right:3px"></i>${it.dl}</div>
        <select class="status-select ${cls}" data-no="${it.no}">
          <option value="">— เลือกสถานะ —</option>
          <option value="done" ${val==='done'?'selected':''}>✓ เรียบร้อย</option>
          <option value="wip" ${val==='wip'?'selected':''}>⏳ กำลังดำเนินการ</option>
          <option value="nope" ${val==='nope'?'selected':''}>✗ ยังไม่เรียบร้อย</option>
          <option value="na" ${val==='na'?'selected':''}>N/A</option>
        </select>`;
      area.appendChild(row);
    });
  });
  area.querySelectorAll('.status-select').forEach(sel=>{
    sel.onchange=function(){
      const no=this.dataset.no;
      storeData[activeStore][no]=this.value;
      saveStore(activeStore,storeData[activeStore]);
      this.className='status-select '+(this.value==='done'?'s-done':this.value==='nope'?'s-nope':this.value==='wip'?'s-wip':this.value==='na'?'s-na':'');
      renderBannerStats();
      buildStoreList(document.getElementById('store-search').value);
    };
  });
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=function(){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    activeTab=+this.dataset.tab;
    if(activeStore)renderTab();
  };
});
document.getElementById('store-search').oninput=function(){buildStoreList(this.value)};

STORES.forEach(([code])=>{storeData[code]=loadStore(code)});
buildStoreList();
</script>
